modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
displayURL = "${mod_homepage}"
logoFile = "${mod_icon}"
issueTrackerURL = "${mod_issues}"
authors = "${mod_author}"
credits = "Sources: ${mod_sources} | Wiki: ${mod_wiki} | Discord: ${mod_discord} | Support: ${mod_support}"
displayTest = "IGNORE_ALL_VERSION"
description = '''
${mod_description}
'''

[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
